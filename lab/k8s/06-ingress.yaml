# Requires ingress-nginx installed in the kind cluster -- see README.md.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coffer-ingress
  namespace: coffer
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: nginx
  rules:
    - host: coffer.local
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: mcp-server
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp
                port:
                  number: 80
