# Same bundle mounted into every OPA sidecar. Swap this ConfigMap for an OPAL
# subscriber (or bundle server pull) once you're ready to distribute policy
# live instead of baking it into the pod spec.
#
# This file is now generated FROM ../opa/policy.rego and ../opa/config.yaml
# (the single source of truth opa test also runs against). Regenerate with:
#   kubectl create configmap opa-policy \
#     --from-file=policy.rego=opa/policy.rego \
#     --from-file=config.yaml=opa/config.yaml \
#     -n coffer --dry-run=client -o yaml > k8s/02-opa-policy-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
  namespace: coffer
data:
  policy.rego: |
    package envoy.authz

    import future.keywords.if
    import future.keywords.in
    import input.attributes.request.http as http_request

    default allow := false

    # Anonymous read-only public routes
    allow if {
        http_request.method == "GET"
        startswith(http_request.path, "/api/public")
    }

    # Admins: full access
    allow if {
        claims.role == "admin"
    }

    # Agentic identities: MCP tool reads only, transfer tools explicitly excluded.
    # This is the seam where OpenFGA/ReBAC relationship checks slot in later —
    # for now it's a flat role+path check to prove the PEP/PDP wiring works.
    allow if {
        claims.role == "agent"
        http_request.method == "POST"
        startswith(http_request.path, "/mcp/tools/")
        not startswith(http_request.path, "/mcp/tools/transfer")
    }

    # Decodes the bearer JWT Envoy forwards unmodified. No signature verification
    # here yet -- add io.jwt.decode_verify with your issuer's JWKS before this
    # leaves "demo lab" status.
    claims := payload if {
        auth_header := http_request.headers.authorization
        [_, encoded] := split(auth_header, " ")
        [_, payload, _] := io.jwt.decode(encoded)
    }

  config.yaml: |
    plugins:
      envoy_ext_authz_grpc:
        addr: :9191
        path: envoy/authz/allow
        dry-run: false
    decision_logs:
      console: true
