# Single-replica Postgres for the lab. Not for anything you care about durability-wise.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: coffer
type: Opaque
stringData:
  POSTGRES_USER: coffer
  POSTGRES_PASSWORD: coffer-dev-password
  POSTGRES_DB: coffer
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: coffer
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "coffer"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: coffer
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
